version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ${HOME}/data/mpa:/data:cached
    ports:
      - "40000-40050:40000-40050/udp"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - JWT_SECRET==:|V7hblR0eD+7+S10F6e~4RPc_!87hd*1kashdh_dsada123*
      - JWT_ISSUER=gotnonameapps.com
      - AUDIENCE=gotnonameapps.com
      - GOOGLE__CLIENTSECRET=${MPA_GOOGLE_CLIENT_SECRET:-}
      - GOOGLE__CLIENTID=${MPA_GOOGLE_CLIENT_ID:-}
      - CERTIFICATEPASSWORD=${MPA_CERTIFICATE_PASSWORD:-}
    # Keeps the container running so VS Code can attach
    command: sleep infinity
    network_mode: bridge
